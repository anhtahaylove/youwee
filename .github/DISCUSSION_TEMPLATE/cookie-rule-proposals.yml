title: "[Cookie rule]: "
labels:
  - cookie-rules
  - needs-validation
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Youwee's recommended cookie-skip rules.

        Propose only the narrowest domain/path pattern that fixes a public download. Never paste cookies, tokens, private URLs, account identifiers, or unredacted logs. A maintainer will test both cookie modes before changing `config/cookie-skip-rules.json`.

  - type: input
    id: pattern
    attributes:
      label: Proposed pattern
      description: Use a narrow domain/path prefix, not an entire domain unless every path is verified.
      placeholder: facebook.com/reel
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Facebook
        - Instagram
        - YouTube
        - TikTok
        - X / Twitter
        - Other
    validations:
      required: true

  - type: input
    id: public_url
    attributes:
      label: Public verification URL
      description: Provide a public URL that does not expose private or account-only content.
      placeholder: https://www.example.com/path/to/public-media
    validations:
      required: true

  - type: textarea
    id: with_cookies
    attributes:
      label: Result when cookies are used
      description: Include metadata-fetch time, download result, and the exact sanitized error if it fails.
      placeholder: Metadata took 18 seconds, then the download failed with ...
    validations:
      required: true

  - type: textarea
    id: without_cookies
    attributes:
      label: Result when cookies are skipped
      description: Repeat the same test with the proposed rule active.
      placeholder: Metadata took 3 seconds and the download completed successfully.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Youwee version, operating system, yt-dlp channel/version, and cookie source.
      placeholder: Youwee 0.19.1-custom.x; Windows 11; yt-dlp Stable 2026.07.04; Firefox profile
    validations:
      required: true

  - type: textarea
    id: sanitized_logs
    attributes:
      label: Sanitized logs
      description: Remove cookies, tokens, local usernames, private paths, account IDs, and unrelated URLs before pasting.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed cookies, tokens, private URLs, account identifiers, personal paths, and other sensitive data.
          required: true
        - label: I understand the rule will only be published after a maintainer validates both modes.
          required: true
