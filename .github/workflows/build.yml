name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos
            arch: aarch64
            friendly_name: Mac-Apple-Silicon
            yt_dlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            yt_dlp_name: youwee-yt-dlp-aarch64-apple-darwin
            bundle_args: ''
          
          # macOS Intel (yt-dlp_macos is Universal Binary for both Intel and Apple Silicon)
          - platform: macos-15
            target: x86_64-apple-darwin
            os_name: macos
            arch: x86_64
            friendly_name: Mac-Intel
            yt_dlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            yt_dlp_name: youwee-yt-dlp-x86_64-apple-darwin
            bundle_args: ''
          
          # Linux x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_name: linux
            arch: x86_64
            friendly_name: Linux
            yt_dlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
            yt_dlp_name: youwee-yt-dlp-x86_64-unknown-linux-gnu
            bundle_args: ''
          
          # Windows x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
            arch: x86_64
            friendly_name: Windows
            yt_dlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            yt_dlp_name: youwee-yt-dlp-x86_64-pc-windows-msvc.exe
            bundle_args: --bundles nsis,msi --config src-tauri/tauri.windows.full.conf.json

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Download yt-dlp binary (Unix)
        if: matrix.os_name != 'windows'
        run: |
          mkdir -p src-tauri/bin
          curl -L -o "src-tauri/bin/${{ matrix.yt_dlp_name }}" "${{ matrix.yt_dlp_url }}"
          chmod +x "src-tauri/bin/${{ matrix.yt_dlp_name }}"
          ls -la src-tauri/bin/

      - name: Cache Windows Full Installer dependencies
        if: matrix.os_name == 'windows'
        uses: actions/cache@v4
        with:
          path: src-tauri/target/dependency-cache/windows
          key: youwee-windows-dependencies-${{ hashFiles('src-tauri/dependencies.windows.lock.json') }}

      - name: Prepare Windows Full Installer dependencies
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: ./scripts/prepare-windows-dependencies.ps1

      - name: Build Tauri app with signing
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          args: --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: Rename artifacts with friendly names (macOS)
        if: matrix.os_name == 'macos'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          # Rename .dmg
          cd dmg
          for f in *.dmg; do
            mv "$f" "Youwee-${{ matrix.friendly_name }}.dmg"
          done
          cd ..
          # Rename .app.tar.gz and .app.tar.gz.sig for updater (must be unique per arch)
          cd macos
          for f in *.app.tar.gz; do
            mv "$f" "Youwee-${{ matrix.arch }}.app.tar.gz"
          done
          for f in *.app.tar.gz.sig; do
            mv "$f" "Youwee-${{ matrix.arch }}.app.tar.gz.sig"
          done
          cd ..
          ls -laR

      - name: Rename artifacts with friendly names (Linux)
        if: matrix.os_name == 'linux'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          # Rename .deb
          if [ -d "deb" ]; then
            cd deb
            for f in *.deb; do
              mv "$f" "Youwee-${{ matrix.friendly_name }}.deb"
            done
            cd ..
          fi
          # Rename .AppImage
          if [ -d "appimage" ]; then
            cd appimage
            for f in *.AppImage; do
              mv "$f" "Youwee-${{ matrix.friendly_name }}.AppImage"
            done
            cd ..
          fi
          ls -laR

      - name: Rename artifacts with friendly names (Windows)
        if: matrix.os_name == 'windows'
        shell: pwsh
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          # Rename .msi
          if (Test-Path "msi") {
            cd msi
            Get-ChildItem *.msi.sig | ForEach-Object {
              Rename-Item $_.Name "Youwee-${{ matrix.friendly_name }}-Full.msi.sig"
            }
            Get-ChildItem *.msi | ForEach-Object { 
              Rename-Item $_.Name "Youwee-${{ matrix.friendly_name }}-Full.msi"
            }
            cd ..
          }
          # Rename .exe (NSIS installer)
          if (Test-Path "nsis") {
            cd nsis
            Get-ChildItem *.exe.sig | ForEach-Object {
              Rename-Item $_.Name "Youwee-${{ matrix.friendly_name }}-Full-Setup.exe.sig"
            }
            Get-ChildItem *.exe | ForEach-Object {
              Rename-Item $_.Name "Youwee-${{ matrix.friendly_name }}-Full-Setup.exe"
            }
            cd ..
          }
          Get-ChildItem -Recurse

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: youwee-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
          if-no-files-found: ignore

  extension:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and package extension archives
        run: bun run ext:package

      - name: Validate Firefox self-hosted extension
        run: bunx web-ext lint --source-dir extensions/youwee-webext/dist/firefox --self-hosted --warnings-as-errors

      - name: Check Firefox signing secrets
        id: firefox-signing
        env:
          FIREFOX_AMO_JWT_ISSUER: ${{ secrets.FIREFOX_AMO_JWT_ISSUER }}
          FIREFOX_AMO_JWT_SECRET: ${{ secrets.FIREFOX_AMO_JWT_SECRET }}
        run: |
          if [ -n "$FIREFOX_AMO_JWT_ISSUER" ] && [ -n "$FIREFOX_AMO_JWT_SECRET" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Firefox AMO secrets are not configured; skipping Firefox extension signing."
          fi

      - name: Sign Firefox extension (AMO unlisted)
        if: steps.firefox-signing.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          SIGN_LOG=$(mktemp)
          bunx web-ext sign \
            --source-dir extensions/youwee-webext/dist/firefox \
            --artifacts-dir extensions/youwee-webext/dist/packages \
            --channel unlisted \
            --api-key "${{ secrets.FIREFOX_AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.FIREFOX_AMO_JWT_SECRET }}" 2>&1 | tee "$SIGN_LOG"
          SIGN_STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$SIGN_STATUS" -eq 0 ]; then
            exit 0
          fi

          EXTENSION_VERSION=$(jq -er '.version' extensions/youwee-webext/dist/firefox/manifest.json)
          if ! grep -Fq "Version $EXTENSION_VERSION already exists." "$SIGN_LOG"; then
            exit "$SIGN_STATUS"
          fi

          echo "AMO already has Firefox extension $EXTENSION_VERSION; recovering its signed XPI from the latest matching workflow artifact."
          ARTIFACT_ID=$(gh api \
            "/repos/$GITHUB_REPOSITORY/actions/artifacts?name=youwee-extension-packages&per_page=100" \
            --jq ".artifacts[] | select(.expired == false and .workflow_run.id != $GITHUB_RUN_ID) | .id" \
            | head -1)
          if [ -z "$ARTIFACT_ID" ]; then
            echo "No non-expired extension artifact is available for AMO version $EXTENSION_VERSION."
            exit "$SIGN_STATUS"
          fi

          RECOVERY_DIR=$(mktemp -d)
          gh api "/repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > "$RECOVERY_DIR/artifact.zip"
          unzip -q "$RECOVERY_DIR/artifact.zip" -d "$RECOVERY_DIR/artifact"
          RECOVERED_XPI=$(find "$RECOVERY_DIR/artifact" -type f -name 'Youwee-Extension-Firefox-signed.xpi' -print -quit)
          if [ -z "$RECOVERED_XPI" ]; then
            echo "The recovery artifact does not contain a signed Firefox XPI."
            exit "$SIGN_STATUS"
          fi

          CURRENT_EXTENSION_ID=$(jq -er '.browser_specific_settings.gecko.id' extensions/youwee-webext/dist/firefox/manifest.json)
          RECOVERED_MANIFEST=$(unzip -p "$RECOVERED_XPI" manifest.json)
          RECOVERED_VERSION=$(printf '%s' "$RECOVERED_MANIFEST" | jq -er '.version')
          RECOVERED_EXTENSION_ID=$(printf '%s' "$RECOVERED_MANIFEST" | jq -er '.browser_specific_settings.gecko.id')
          if [ "$RECOVERED_VERSION" != "$EXTENSION_VERSION" ] || [ "$RECOVERED_EXTENSION_ID" != "$CURRENT_EXTENSION_ID" ]; then
            echo "Recovered XPI identity mismatch: $RECOVERED_EXTENSION_ID $RECOVERED_VERSION"
            exit "$SIGN_STATUS"
          fi

          cp "$RECOVERED_XPI" extensions/youwee-webext/dist/packages/Youwee-Extension-Firefox-signed.xpi
          echo "Recovered signed Firefox XPI $RECOVERED_VERSION from artifact $ARTIFACT_ID."

      - name: Rename signed Firefox XPI
        if: steps.firefox-signing.outputs.enabled == 'true'
        run: |
          TARGET_XPI="extensions/youwee-webext/dist/packages/Youwee-Extension-Firefox-signed.xpi"
          if [ ! -f "$TARGET_XPI" ]; then
            SIGNED_XPI=$(find extensions/youwee-webext/dist/packages -name "*.xpi" | head -1)
            if [ -z "$SIGNED_XPI" ]; then
              echo "Signed Firefox XPI not found."
              exit 1
            fi
            mv "$SIGNED_XPI" "$TARGET_XPI"
          fi
          ls -la extensions/youwee-webext/dist/packages

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v6
        with:
          name: youwee-extension-packages
          path: |
            extensions/youwee-webext/dist/packages/Youwee-Extension-Chromium.zip
            extensions/youwee-webext/dist/packages/Youwee-Extension-Firefox.zip
            extensions/youwee-webext/dist/packages/Youwee-Extension-Firefox-signed.xpi
          if-no-files-found: error

  # Create release after all builds complete
  release:
    needs: [build, extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Verify required release artifacts
        run: |
          REQUIRED_ASSETS=(
            "Youwee-Windows-Full.msi"
            "Youwee-Windows-Full.msi.sig"
            "Youwee-Windows-Full-Setup.exe"
            "Youwee-Windows-Full-Setup.exe.sig"
            "Youwee-Extension-Chromium.zip"
            "Youwee-Extension-Firefox.zip"
            "Youwee-Extension-Firefox-signed.xpi"
          )

          for asset in "${REQUIRED_ASSETS[@]}"; do
            if ! find artifacts -type f -name "$asset" -print -quit | grep -q .; then
              echo "Missing required release asset: $asset"
              exit 1
            fi
          done

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting changelog for version: $VERSION"
          
          # Function to extract changelog section for a given file
          extract_changelog() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo ""
              return
            fi
            awk -v ver="$VERSION" '
              BEGIN { found=0; content="" }
              /^## \[/ {
                if (found) exit
                if (index($0, "[" ver "]") > 0) found=1
                next
              }
              found { content = content $0 "\n" }
              END { print content }
            ' "$file"
          }
          
          # Function to convert content to JSON-safe string
          to_json_safe() {
            echo "$1" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/$/\\n/' | tr -d '\n' | sed 's/\\n$//'
          }
          
          # Extract English changelog (primary)
          CHANGELOG_CONTENT=$(extract_changelog "CHANGELOG.md")
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT="See commit history for changes in this release."
          fi
          echo "$CHANGELOG_CONTENT" > CHANGELOG_EXTRACT.md
          CHANGELOG_JSON=$(to_json_safe "$CHANGELOG_CONTENT")
          echo "$CHANGELOG_JSON" > CHANGELOG_JSON.txt
          
          # Extract Vietnamese changelog
          CHANGELOG_VI=$(extract_changelog "docs/CHANGELOG.vi.md")
          if [ -n "$CHANGELOG_VI" ]; then
            CHANGELOG_VI_JSON=$(to_json_safe "$CHANGELOG_VI")
            echo "$CHANGELOG_VI_JSON" > CHANGELOG_VI_JSON.txt
          fi
          
          # Extract Chinese changelog
          CHANGELOG_ZH=$(extract_changelog "docs/CHANGELOG.zh-CN.md")
          if [ -n "$CHANGELOG_ZH" ]; then
            CHANGELOG_ZH_JSON=$(to_json_safe "$CHANGELOG_ZH")
            echo "$CHANGELOG_ZH_JSON" > CHANGELOG_ZH_JSON.txt
          fi

          # Extract French changelog
          CHANGELOG_FR=$(extract_changelog "docs/CHANGELOG.fr.md")
          if [ -n "$CHANGELOG_FR" ]; then
            CHANGELOG_FR_JSON=$(to_json_safe "$CHANGELOG_FR")
            echo "$CHANGELOG_FR_JSON" > CHANGELOG_FR_JSON.txt
          fi

          # Extract Russian changelog
          CHANGELOG_RU=$(extract_changelog "docs/CHANGELOG.ru.md")
          if [ -n "$CHANGELOG_RU" ]; then
            CHANGELOG_RU_JSON=$(to_json_safe "$CHANGELOG_RU")
            echo "$CHANGELOG_RU_JSON" > CHANGELOG_RU_JSON.txt
          fi
          
          echo "Extracted changelog:"
          cat CHANGELOG_EXTRACT.md

      - name: Generate latest.json for updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Read the JSON-safe changelogs
          NOTES=$(cat CHANGELOG_JSON.txt 2>/dev/null || echo "Youwee $GITHUB_REF_NAME - Check release notes for details")
          NOTES_VI=$(cat CHANGELOG_VI_JSON.txt 2>/dev/null || echo "")
          NOTES_ZH=$(cat CHANGELOG_ZH_JSON.txt 2>/dev/null || echo "")
          NOTES_FR=$(cat CHANGELOG_FR_JSON.txt 2>/dev/null || echo "")
          NOTES_RU=$(cat CHANGELOG_RU_JSON.txt 2>/dev/null || echo "")
          
          # Build notes fields
          NOTES_EXTRA=""
          if [ -n "$NOTES_VI" ]; then
            NOTES_EXTRA="$NOTES_EXTRA
            \"notes_vi\": \"$NOTES_VI\","
          fi
          if [ -n "$NOTES_ZH" ]; then
            NOTES_EXTRA="$NOTES_EXTRA
            \"notes_zh-CN\": \"$NOTES_ZH\","
          fi
          if [ -n "$NOTES_FR" ]; then
            NOTES_EXTRA="$NOTES_EXTRA
            \"notes_fr\": \"$NOTES_FR\","
          fi
          if [ -n "$NOTES_RU" ]; then
            NOTES_EXTRA="$NOTES_EXTRA
            \"notes_ru\": \"$NOTES_RU\","
          fi
          
          # Find signature files and create platform entries
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "$NOTES",${NOTES_EXTRA}
            "pub_date": "$PUB_DATE",
            "platforms": {
          EOF
          
          FIRST=true
          
          # macOS Apple Silicon
          AARCH64_SIG=$(find artifacts -name "Youwee-aarch64.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$AARCH64_SIG" ] && [ -f "$AARCH64_SIG" ]; then
            SIG=$(cat "$AARCH64_SIG")
            if [ "$FIRST" = false ]; then echo "," >> latest.json; fi
            FIRST=false
            cat >> latest.json << PLATFORM
            "darwin-aarch64": {
              "signature": "$SIG",
              "url": "https://github.com/${{ github.repository }}/releases/download/$GITHUB_REF_NAME/Youwee-aarch64.app.tar.gz"
            }
          PLATFORM
          fi
          
          # macOS Intel
          X86_64_SIG=$(find artifacts -name "Youwee-x86_64.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$X86_64_SIG" ] && [ -f "$X86_64_SIG" ]; then
            SIG=$(cat "$X86_64_SIG")
            if [ "$FIRST" = false ]; then echo "," >> latest.json; fi
            FIRST=false
            cat >> latest.json << PLATFORM
            "darwin-x86_64": {
              "signature": "$SIG",
              "url": "https://github.com/${{ github.repository }}/releases/download/$GITHUB_REF_NAME/Youwee-x86_64.app.tar.gz"
            }
          PLATFORM
          fi
          
          # Linux
          LINUX_SIG=$(find artifacts -name "*.AppImage.sig" 2>/dev/null | head -1)
          if [ -n "$LINUX_SIG" ] && [ -f "$LINUX_SIG" ]; then
            SIG=$(cat "$LINUX_SIG")
            if [ "$FIRST" = false ]; then echo "," >> latest.json; fi
            FIRST=false
            cat >> latest.json << PLATFORM
              "linux-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$GITHUB_REF_NAME/Youwee-Linux.AppImage"
              }
          PLATFORM
          fi
          
          # Windows NSIS
          WIN_SIG=$(find artifacts -name "Youwee-Windows-Full-Setup.exe.sig" 2>/dev/null | head -1)
          if [ -n "$WIN_SIG" ] && [ -f "$WIN_SIG" ]; then
            SIG=$(cat "$WIN_SIG")
            if [ "$FIRST" = false ]; then echo "," >> latest.json; fi
            FIRST=false
            cat >> latest.json << PLATFORM
              "windows-x86_64": {
                "signature": "$SIG",
                "url": "https://github.com/${{ github.repository }}/releases/download/$GITHUB_REF_NAME/Youwee-Windows-Full-Setup.exe"
              }
          PLATFORM
          fi
          
          # Close JSON
          cat >> latest.json << EOF
            }
          }
          EOF
          
          echo "Generated latest.json:"
          cat latest.json

      - name: Generate Firefox extension update manifest
        run: |
          FIREFOX_XPI=$(find artifacts -type f -name "Youwee-Extension-Firefox-signed.xpi" -print -quit)
          EXTENSION_MANIFEST=$(unzip -p "$FIREFOX_XPI" manifest.json)
          EXTENSION_ID=$(printf '%s' "$EXTENSION_MANIFEST" | jq -er '.browser_specific_settings.gecko.id')
          EXTENSION_VERSION=$(printf '%s' "$EXTENSION_MANIFEST" | jq -er '.version')
          EXTENSION_MIN_VERSION=$(printf '%s' "$EXTENSION_MANIFEST" | jq -er '.browser_specific_settings.gecko.strict_min_version')
          XPI_SHA256=$(sha256sum "$FIREFOX_XPI" | cut -d' ' -f1)
          XPI_URL="https://github.com/${{ github.repository }}/releases/download/$GITHUB_REF_NAME/Youwee-Extension-Firefox-signed.xpi"

          jq -n \
            --arg id "$EXTENSION_ID" \
            --arg version "$EXTENSION_VERSION" \
            --arg minVersion "$EXTENSION_MIN_VERSION" \
            --arg link "$XPI_URL" \
            --arg hash "$XPI_SHA256" \
            '{
              addons: {
                ($id): {
                  updates: [{
                    version: $version,
                    update_link: $link,
                    update_hash: ("sha256:" + $hash),
                    applications: {
                      gecko: {
                        strict_min_version: $minVersion
                      }
                    }
                  }]
                }
              }
            }' > firefox-updates.json

          jq -e --arg id "$EXTENSION_ID" --arg version "$EXTENSION_VERSION" \
            '.addons[$id].updates[0].version == $version' firefox-updates.json > /dev/null
          echo "Generated firefox-updates.json:"
          cat firefox-updates.json

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          
          # Create SHA256SUMS.txt with proper format
          echo "# SHA256 Checksums for Youwee $GITHUB_REF_NAME" > ../SHA256SUMS.txt
          echo "# Generated: $(date -u)" >> ../SHA256SUMS.txt
          echo "" >> ../SHA256SUMS.txt
          
          # Generate checksums for all installer files
          find . -type f \( \
            -name "*.dmg" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o \
            -name "*.app.tar.gz" -o \
            -name "*.xpi" -o \
            -name "Youwee-Extension-*.zip" \
          \) ! -name "*.sig" | sort | while read file; do
            filename=$(basename "$file")
            hash=$(sha256sum "$file" | cut -d' ' -f1)
            echo "$hash  $filename" >> ../SHA256SUMS.txt
          done
          
          cd ..
          echo "Generated SHA256SUMS.txt:"
          cat SHA256SUMS.txt

      - name: Create release body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          
          # Start with header
          cat > RELEASE_BODY.md << 'HEADER'
          # Youwee ${{ github.ref_name }}
          
          A modern, beautiful YouTube downloader built with Tauri.
          
          HEADER
          
          # Add What's New section from changelog
          echo "## What's New" >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          cat CHANGELOG_EXTRACT.md >> RELEASE_BODY.md
          echo "" >> RELEASE_BODY.md
          
          cat >> RELEASE_BODY.md << 'DOWNLOADS'
          ## Download
          
          | Platform | File | Description |
          |----------|------|-------------|
          | 🍎 **Mac (M1/M2/M3/M4)** | `Youwee-Mac-Apple-Silicon.dmg` | For Apple Silicon Macs |
